name: Sync Encrypted File from MEGAMAP

on:
  # תירוץ יומי בשעה 00:00 UTC (ניתן להתאים לצרכים)
  schedule:
    - cron: '0 0 * * *'
  
  # אפשרות להריץ ידנית
  workflow_dispatch:
  
  # אם רוצים תירוץ כאשר הקובץ מתעדכן ברפו של MEGAMAP (צריך להגדיר webhook)
  # repository_dispatch:
  #   types: [megamap-updated]

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download encrypted file from MEGAMAP repository
        env:
          MEGAMAP_TOKEN: ${{ secrets.MEGAMAP_ACCESS }}
        run: |
          set -e
          MEGAMAP_OWNER="ShebaMicrobiomeCenter"
          MEGAMAP_REPO="megamap"
          MEGAMAP_FILE_PATH="latest-light.csv.enc"
          API_URL="https://api.github.com/repos/${MEGAMAP_OWNER}/${MEGAMAP_REPO}/contents/${MEGAMAP_FILE_PATH}"
          echo "📥 Downloading from: $API_URL"
          RESPONSE=$(curl -s -L \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $MEGAMAP_TOKEN" \
            "$API_URL")
          
          # בדוק אם קיבלנו שגיאה
          if echo "$RESPONSE" | grep -q '"message"'; then
            echo "❌ שגיאה בהורדת הקובץ"
            echo "Response: $RESPONSE"
            exit 1
          fi
          
          # חלץ את התוכן המקודד base64 using jq (handles multi-line content)
          ENCODED_CONTENT=$(echo "$RESPONSE" | jq -r '.content')
          
          if [ -z "$ENCODED_CONTENT" ] || [ "$ENCODED_CONTENT" = "null" ]; then
            echo "❌ לא ניתן לחלץ את התוכן מהתגובה"
            echo "Response: $RESPONSE"
            exit 1
          fi
          
          # בטל קידוד base64 וחסוך לקובץ
          FILE_NAME=$(basename "$MEGAMAP_FILE_PATH")
          echo "$ENCODED_CONTENT" | base64 -d > "$FILE_NAME"
          
          if [ ! -f "$FILE_NAME" ] || [ ! -s "$FILE_NAME" ]; then
            echo "❌ הקובץ לא נשמר בהצלחה"
            exit 1
          fi
          
          echo "✅ הקובץ הורד בהצלחה: $FILE_NAME"

      - name: Check if file changed
        id: check_changes
        run: |
          if git diff --quiet "$(ls *.enc 2>/dev/null | head -1 || echo '.gitkeep')"; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "📄 אין שינויים בקובץ"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "🔄 הקובץ התעדכן"
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          FILE_NAME=$(ls *.enc 2>/dev/null | head -1)
          git add "$FILE_NAME"
          git commit -m "🔄 Update encrypted file: $FILE_NAME" || true
          git push

      - name: Update status
        if: always()
        run: |
          if [ "${{ steps.check_changes.outputs.changed }}" = "true" ]; then
            echo "✅ Sync completed successfully - file updated"
          else
            echo "✅ Sync completed - no changes needed"
          fi
