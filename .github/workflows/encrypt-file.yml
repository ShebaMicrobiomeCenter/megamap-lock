name: Encrypt File

on:
  # אפשרות להריץ את ההצפנה ידנית דרך GitHub UI
  workflow_dispatch:
    inputs:
      csv_file_url:
        description: 'קישור לקובץ CSV (ניתן להשתמש ב-raw GitHub URL)'
        required: true
        type: string
      password:
        description: 'סיסמה להצפנה'
        required: true
        type: string
      output_filename:
        description: 'שם הקובץ המוצפן (ללא .enc)'
        required: true
        default: 'megamap_data'
        type: string

jobs:
  encrypt:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Download CSV file
        env:
          CSV_URL: ${{ github.event.inputs.csv_file_url }}
        run: |
          echo "📥 Downloading CSV from: $CSV_URL"
          curl -L -o input.csv "$CSV_URL"
          
          if [ ! -f input.csv ]; then
            echo "❌ Failed to download file"
            exit 1
          fi
          
          FILE_SIZE=$(wc -c < input.csv)
          echo "✅ Downloaded successfully ($FILE_SIZE bytes)"

      - name: Encrypt file
        env:
          PASSWORD: ${{ github.event.inputs.password }}
          OUTPUT_NAME: ${{ github.event.inputs.output_filename }}
        run: |
          node encrypt.js input.csv "${OUTPUT_NAME}.enc" "$PASSWORD"

      - name: Commit encrypted file
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          OUTPUT_NAME="${{ github.event.inputs.output_filename }}"
          
          git add "${OUTPUT_NAME}.enc"
          git commit -m "🔐 Encrypt file: ${OUTPUT_NAME}.enc [skip ci]" || true
          git push

      - name: Clean up sensitive data
        if: always()
        run: |
          rm -f input.csv "${OUTPUT_NAME}.enc"
          history -c
