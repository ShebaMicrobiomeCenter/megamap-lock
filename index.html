<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MegaMap - צפיה בנתונים מוצפנים</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .content {
            padding: 40px;
        }

        .login-section {
            text-align: center;
        }

        .login-section.hidden {
            display: none;
        }

        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-weight: 600;
            color: #333;
            text-align: right;
            font-size: 0.95em;
        }

        input[type="file"],
        input[type="password"],
        input[type="text"] {
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        input[type="file"]:focus,
        input[type="password"]:focus,
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        input[type="file"]::file-selector-button {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }

        input[type="file"]::file-selector-button:hover {
            background: #5568d3;
        }

        .button-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 28px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            flex: 1;
            min-width: 150px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn-success {
            background: #4caf50;
            color: white;
        }

        .btn-success:hover {
            background: #45a049;
        }

        .message {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .message.error {
            background: #ffebee;
            color: #c62828;
            border-left: 4px solid #c62828;
        }

        .message.success {
            background: #e8f5e9;
            color: #2e7d32;
            border-left: 4px solid #2e7d32;
        }

        .message.info {
            background: #e3f2fd;
            color: #1565c0;
            border-left: 4px solid #1565c0;
        }

        .message.hidden {
            display: none;
        }

        .data-section {
            display: none;
        }

        .data-section.active {
            display: block;
        }

        .data-controls {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
        }

        .search-box input,
        .filter-box select {
            width: 100%;
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.95em;
        }

        .filter-box {
            min-width: 250px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .filter-box label {
            font-size: 0.95em;
            font-weight: 600;
            color: #333;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }

        .export-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th {
            background: #f5f5f5;
            padding: 12px 15px;
            text-align: right;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #e0e0e0;
            font-size: 0.95em;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 0.9em;
            color: #555;
        }

        tr:hover {
            background: #fafafa;
        }

        .info-bar {
            background: #f5f5f5;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .info-bar span {
            font-weight: 600;
            color: #333;
        }

        .row-count {
            background: white;
            padding: 6px 12px;
            border-radius: 6px;
            color: #667eea;
            font-weight: 600;
        }

        .password-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 15px;
            background: #e8f5e9;
            border-radius: 6px;
            color: #2e7d32;
            font-size: 0.9em;
        }

        .password-indicator::before {
            content: "🔒";
            font-size: 1.2em;
        }

        .clear-password-btn {
            background: #ff5252;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            transition: background 0.3s;
        }

        .clear-password-btn:hover {
            background: #ff1744;
        }

        .loading {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #4f5b7b;
            font-weight: 500;
            font-size: 0.95em;
            padding: 10px 14px;
            background: #f4f7ff;
            border: 1px solid #dfe7ff;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .loading.hidden {
            display: none;
        }

        .spinner {
            border: 2px solid #dfe7ff;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 0.9s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .no-data {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .no-data-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .content {
                padding: 20px;
            }

            .data-controls {
                flex-direction: column;
            }

            .search-box {
                min-width: 100%;
            }

            .export-buttons {
                width: 100%;
                justify-content: center;
            }

            .export-buttons button {
                flex: 1;
                min-width: unset;
            }

            table {
                font-size: 0.85em;
            }

            th, td {
                padding: 8px 10px;
            }

            .info-bar {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 MegaMap Data Viewer</h1>
            <p>צפייה בנתונים מוצפנים באמצעות סיסמה</p>
        </div>

        <div class="content">
            <!-- Login Section -->
            <div class="login-section" id="loginSection">
                <form id="decryptForm" onsubmit="decryptFile(); return false;">
                    <div id="messageBox" class="message hidden"></div>

                    <div class="form-group">
                        <label>קובץ מוצפן: <strong>latest-light.csv.enc</strong></label>
                        <p style="font-size:0.9em;color:#666;">(הקובץ ייטען אוטומטית מהאתר)</p>
                    </div>

                    <div class="form-group">
                        <label for="passwordInput">סיסמה:</label>
                        <input type="password" id="passwordInput" placeholder="הכנס סיסמה..." autocomplete="new-password">
                    </div>

                    <div class="button-group">
                        <button type="submit" class="btn-primary">פענוח וצפייה</button>
                    </div>
                </form>
            </div>

            <!-- Data Section -->
            <div class="data-section" id="dataSection">
                <div class="info-bar">
                    <div class="password-indicator" id="passwordStatus">
                        סיסמה שמורה בדפדפן (בטוח לניקוי)
                    </div>
                    <span class="row-count">0 שורות</span>
                    <button class="clear-password-btn" onclick="clearPassword()">ניקוי סיסמה</button>
                </div>

                <div class="data-controls">
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="חיפוש בנתונים..." onkeyup="filterTable()">
                    </div>
                    <div class="filter-box">
                        <label for="databaseFilterSelect">סינון לפי DATABASE:</label>
                        <select id="databaseFilterSelect" onchange="onDatabaseFilterChange()"></select>
                    </div>
                    <div class="export-buttons">
                        <button class="btn-success" onclick="downloadCSV()">⬇ הורדה כ-CSV</button>
                        <button class="btn-secondary" onclick="logout()">חזרה</button>
                    </div>
                </div>

                <div id="loadingBar" class="loading hidden">
                    <div class="spinner"></div>
                    <span>מעבד נתונים...</span>
                </div>

                <div id="tableContainer" class="table-wrapper"></div>
            </div>
        </div>
    </div>

    <script>
        // CryptoJS-like implementation for AES-256-GCM
        const HEADER = 'MEGAMAP1';
        const HEADER_SIZE = 8;
        const SALT_SIZE = 16;
        const IV_SIZE = 12;
        const TAG_SIZE = 16;

        let currentData = null;
        let currentHeaders = [];
        let currentPassword = null;
        let currentFileName = null;
        let currentDatabaseColumn = null;
        let currentDatabaseFilter = null;
        let currentFilteredData = null;

        // PBKDF2 key derivation
        async function deriveKey(password, salt) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            
            const baseKey = await crypto.subtle.importKey(
                'raw',
                data,
                'PBKDF2',
                false,
                ['deriveBits']
            );

            const derivedBits = await crypto.subtle.deriveBits(
                {
                    name: 'PBKDF2',
                    salt: salt,
                    iterations: 200000,
                    hash: 'SHA-256'
                },
                baseKey,
                256
            );

            return crypto.subtle.importKey(
                'raw',
                derivedBits,
                'AES-GCM',
                false,
                ['decrypt']
            );
        }

        // Decrypt file
        async function decryptFile() {
            const passwordInput = document.getElementById('passwordInput');
            const messageBox = document.getElementById('messageBox');
            const loadingBar = document.getElementById('loadingBar');

            if (!passwordInput.value) {
                showMessage('הכנס סיסמה', 'error', messageBox);
                return;
            }

            try {
                showMessage('טוען את הקובץ המוצפן... אנא המתן', 'info', messageBox);
                loadingBar.classList.remove('hidden');

                const password = passwordInput.value;

                // Fetch the encrypted file from the same folder as the page (relative path)
                const resp = await fetch('latest-light.csv.enc');
                if (!resp.ok) throw new Error('שגיאה בהורדת הקובץ מהשרת');
                const arrayBuffer = await resp.arrayBuffer();
                const view = new Uint8Array(arrayBuffer);

                // Validate header
                const headerBytes = view.slice(0, HEADER_SIZE);
                const headerStr = new TextDecoder().decode(headerBytes);
                if (headerStr !== HEADER) {
                    throw new Error('קובץ לא תקין: header לא תואם');
                }

                // Extract components
                const salt = view.slice(HEADER_SIZE, HEADER_SIZE + SALT_SIZE);
                const iv = view.slice(HEADER_SIZE + SALT_SIZE, HEADER_SIZE + SALT_SIZE + IV_SIZE);
                const ciphertext = view.slice(HEADER_SIZE + SALT_SIZE + IV_SIZE, -TAG_SIZE);
                const tag = view.slice(-TAG_SIZE);

                // Derive key
                const key = await deriveKey(password, salt);

                // Decrypt - concatenate ciphertext + tag using Uint8Array
                const combined = new Uint8Array(ciphertext.length + tag.length);
                combined.set(ciphertext, 0);
                combined.set(tag, ciphertext.length);

                const decrypted = await crypto.subtle.decrypt(
                    {
                        name: 'AES-GCM',
                        iv: iv,
                        tagLength: 128
                    },
                    key,
                    combined.buffer
                );

                // Parse CSV
                const csvText = new TextDecoder().decode(decrypted);
                parseAndDisplayCSV(csvText);
                loadingBar.classList.add('hidden');

                // Store password in session
                currentPassword = password;
                currentFileName = 'latest-light.csv.enc';

                // Save password (only) to localStorage
                localStorage.setItem('encryptedFilePassword', password);

                // Hide login, show data
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('dataSection').classList.add('active');
                messageBox.classList.add('hidden');

            } catch (error) {
                console.error('Decryption error:', error);
                showMessage('שגיאה בפענוח: ' + error.message, 'error', messageBox);
                loadingBar.classList.add('hidden');
            }
        }

        // Parse and display CSV
        function parseAndDisplayCSV(csvText) {
            const lines = csvText.split('\n').filter(line => line.trim());
            if (lines.length === 0) {
                showMessage('הקובץ ריק', 'error', document.getElementById('messageBox'));
                return;
            }

            // Parse headers
            currentHeaders = parseCSVLine(lines[0]);
            currentDatabaseColumn = currentHeaders.find(header => header.trim().toLowerCase() === 'database') || null;
            
            // Parse data
            currentData = [];
            for (let i = 1; i < lines.length; i++) {
                const values = parseCSVLine(lines[i]);
                if (values.length > 0) {
                    const row = {};
                    currentHeaders.forEach((header, index) => {
                        row[header] = values[index] || '';
                    });
                    currentData.push(row);
                }
            }

            const lastRowDatabase = currentData.length && currentDatabaseColumn ? currentData[currentData.length - 1][currentDatabaseColumn] || 'all' : 'all';
            populateDatabaseFilterOptions(lastRowDatabase);
            filterTable();
        }

        // Parse CSV line (handle quoted fields)
        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;

            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                const nextChar = line[i + 1];

                if (char === '"') {
                    if (inQuotes && nextChar === '"') {
                        current += '"';
                        i++;
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (char === ',' && !inQuotes) {
                    result.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }

            result.push(current.trim());
            return result;
        }

        // Display table
        function displayTable(data) {
            const container = document.getElementById('tableContainer');
            
            if (data.length === 0) {
                container.innerHTML = `
                    <div class="no-data">
                        <div class="no-data-icon">📭</div>
                        <p>אין נתונים להצגה</p>
                    </div>
                `;
                return;
            }

            let html = '<table><thead><tr>';
            currentHeaders.forEach(header => {
                html += `<th>${escapeHtml(header)}</th>`;
            });
            html += '</tr></thead><tbody>';

            data.forEach((row, idx) => {
                html += '<tr>';
                currentHeaders.forEach(header => {
                    const value = row[header] || '';
                    html += `<td>${escapeHtml(value)}</td>`;
                });
                html += '</tr>';
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        function normalizeValue(value) {
            return (value || '').toString().trim().toLowerCase();
        }

        function getFilteredData() {
            if (!currentData) return [];
            if (!currentDatabaseColumn || !currentDatabaseFilter || currentDatabaseFilter === 'all') {
                return currentData;
            }
            return currentData.filter(row => normalizeValue(row[currentDatabaseColumn]) === normalizeValue(currentDatabaseFilter));
        }

        function populateDatabaseFilterOptions(defaultDatabase) {
            const select = document.getElementById('databaseFilterSelect');
            if (!select) return;

            if (!currentDatabaseColumn) {
                select.innerHTML = '';
                const noDbOption = document.createElement('option');
                noDbOption.value = 'all';
                noDbOption.textContent = 'אין עמודת DATABASE במסמך';
                select.appendChild(noDbOption);
                select.disabled = true;
                currentDatabaseFilter = 'all';
                return;
            }

            select.disabled = false;
            const rawDatabases = currentData
                .map(row => row[currentDatabaseColumn] || '')
                .map(value => value.toString().trim())
                .filter(Boolean);

            const distinctDatabases = Array.from(new Set(rawDatabases));

            select.innerHTML = '';

            const allOption = document.createElement('option');
            allOption.value = 'all';
            allOption.textContent = 'הצג את כל ה-DATABASE';
            select.appendChild(allOption);

            distinctDatabases.forEach(db => {
                const option = document.createElement('option');
                option.value = normalizeValue(db);
                option.textContent = db;
                select.appendChild(option);
            });

            if (defaultDatabase && distinctDatabases.some(db => normalizeValue(db) === normalizeValue(defaultDatabase))) {
                select.value = normalizeValue(defaultDatabase);
                currentDatabaseFilter = normalizeValue(defaultDatabase);
            } else {
                select.value = 'all';
                currentDatabaseFilter = 'all';
            }
        }

        function onDatabaseFilterChange() {
            currentDatabaseFilter = document.getElementById('databaseFilterSelect').value;
            filterTable();
        }

        // Filter table
        function filterTable() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            let filtered = getFilteredData();

            if (searchTerm) {
                filtered = filtered.filter(row => {
                    return currentHeaders.some(header => {
                        const value = (row[header] || '').toLowerCase();
                        return value.includes(searchTerm);
                    });
                });
            }

            currentFilteredData = filtered;
            displayTable(filtered);
            updateInfoBar(filtered.length);
        }

        // Update info bar
        function updateInfoBar(count = null) {
            const rowCount = count !== null ? count : (currentData ? currentData.length : 0);
            let el = document.querySelector('.row-count');
            if (!el) {
                const infoBar = document.querySelector('.info-bar');
                if (infoBar) {
                    el = document.createElement('span');
                    el.className = 'row-count';
                    el.textContent = `${rowCount} שורות`;
                    // insert before clear button if present
                    const clearBtn = infoBar.querySelector('.clear-password-btn');
                    if (clearBtn) infoBar.insertBefore(el, clearBtn);
                    else infoBar.appendChild(el);
                    return;
                } else {
                    console.warn('info-bar element not found');
                    return;
                }
            }
            el.textContent = `${rowCount} שורות`;
        }

        // Download as CSV
        function downloadCSV() {
            const visibleData = currentFilteredData || currentData || [];
            let csv = currentHeaders.join(',') + '\n';
            
            visibleData.forEach(row => {
                const values = currentHeaders.map(header => {
                    const value = row[header] || '';
                    // Escape quotes and wrap in quotes if contains comma
                    if (value.includes(',') || value.includes('"') || value.includes('\n')) {
                        return `"${value.replace(/"/g, '""')}"`;
                    }
                    return value;
                });
                csv += values.join(',') + '\n';
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'megamap_data.csv';
            link.click();
        }

        // Clear password
        function clearPassword() {
            if (confirm('האם אתה בטוח שברצונך לנקות את הסיסמה?')) {
                currentPassword = null;
                localStorage.removeItem('encryptedFilePassword');
                logout();
            }
        }

        // Logout
        function logout() {
            document.getElementById('loginSection').classList.remove('hidden');
            document.getElementById('dataSection').classList.remove('active');
            document.getElementById('passwordInput').value = '';
            document.getElementById('searchInput').value = '';
            document.getElementById('tableContainer').innerHTML = '';
            currentData = null;
            currentHeaders = [];
            currentFilteredData = null;
            currentDatabaseFilter = null;
        }

        // Show message
        function showMessage(text, type, element) {
            element.textContent = text;
            element.className = `message ${type}`;
            element.classList.remove('hidden');
        }

        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Check for stored password on load
        window.addEventListener('load', () => {
            const savedPassword = localStorage.getItem('encryptedFilePassword');
            if (savedPassword) {
                document.getElementById('passwordInput').value = savedPassword;
            }
        });

        // Prevent accidental unload
        window.addEventListener('beforeunload', (e) => {
            if (currentData && currentData.length > 0) {
                e.preventDefault();
                e.returnValue = '';
            }
        });
    </script>
</body>
</html>
